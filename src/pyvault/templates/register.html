{% extends "base.html" %}

{% block title %}PyVault - Register{% endblock %}

{% block content %}
<h2>Create Your Master Account</h2>

<p style="text-align: center; color: #dc3545; max-width: 500px; margin: 10px auto;">
    <strong>Important Security Note:</strong> Please remember your master password. If you lose it, we cannot recover your passwords.
</p>

<form method="post">
    <div class="form-group">
        <label for="email">Email Address:</label>
        <input type="text" id="email" name="email" required placeholder="your.name@example.com">
    </div>

    <div class="form-group">
        <label for="password">Master Password:</label>
        <input type="password" id="password" name="password" required placeholder="Create a strong master password">
    </div>

    <button type="submit" style="background: #007bff;">Register Account</button>
</form>

<p style="text-align: center; margin-top: 20px;">
    Already have an account? <a href="{{ url_for('login') }}" style="color: #667eea; text-decoration: none;">Log in here</a>.
</p>
{% endblock %}

{% extends "base.html" %}

{% block title %}PyVault - Initialize Vault{% endblock %}

{% block content %}
<h2>Initialize Cyber-Vault</h2>

<p style="text-align: center; color: var(--border-magenta); font-size: 0.95rem; margin-bottom: 25px; text-shadow: 0 0 5px var(--glow-magenta); letter-spacing: 0.5px;">
    SYSTEM WARNING: Write down your credentials. Lost keys cannot be recovered.
</p>

<form method="post">
    <div class="form-group">
        <label for="email">Registrant Email:</label>
        <input type="text" id="email" name="email" required placeholder="email@domain.com">
    </div>

    <div class="form-group">
        <label for="password">Master Password:</label>
        <input type="password" id="password" name="password" required placeholder="Select a strong master password">
    </div>

    <button type="submit" style="background: linear-gradient(135deg, #bd00ff 0%, #ff007f 100%); box-shadow: 0 0 10px rgba(255, 0, 127, 0.25);">Initialize Vault</button>
</form>

<p style="text-align: center; margin-top: 25px; font-size: 0.95rem; color: var(--text-muted);">
    Existing vault owner? <a href="{{ url_for('login') }}" style="color: var(--text-cyan); text-decoration: none; text-shadow: 0 0 5px var(--glow-cyan);">Decrypt here</a>.
</p>
{% endblock %}

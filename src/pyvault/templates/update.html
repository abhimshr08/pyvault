{% extends "base.html" %}

{% block title %}PyVault - Update Password{% endblock %}

{% block content %}
<h2>Update Password for {{ service }}</h2>

<p><strong>Current Username:</strong> {{ username }}</p>

<form method="post">
    <div class="form-group">
        <label for="password">New Password (leave empty to generate):</label>
        <input type="password" id="password" name="password" placeholder="Enter new password or leave blank for auto-generation">
    </div>

    <button type="submit">Update Password</button>
</form>

<a href="{{ url_for('index') }}" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px;">Cancel</a>
{% endblock %}

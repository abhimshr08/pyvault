{% extends "base.html" %}

{% block title %}PyVault - Update Credentials{% endblock %}

{% block content %}
<h2>Update Password for {{ service }}</h2>

<p style="text-align: center; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 25px;">
    Username: <span style="color: var(--text-cyan);">{{ username }}</span>
</p>

<form method="post">
    <div class="form-group">
        <label for="password">New Password (leave blank to auto-generate):</label>
        <input type="password" id="password" name="password" placeholder="Enter new password or leave empty for auto-generation">
    </div>

    <button type="submit">Update & Encrypt Password</button>
</form>

<div style="text-align: center; margin-top: 25px;">
    <a href="{{ url_for('index') }}" class="nav a" style="padding: 8px 18px;">Cancel</a>
</div>
{% endblock %}

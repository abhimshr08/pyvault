{% extends "base.html" %}

{% block title %}PyVault - Add Credentials{% endblock %}

{% block content %}
<h2>Add Credentials</h2>

<form method="post">
    <div class="form-group">
        <label for="service">Service/Application Name:</label>
        <input type="text" id="service" name="service" required placeholder="e.g. Google, GitHub, AWS">
    </div>

    <div class="form-group">
        <label for="username">Username or Email Address:</label>
        <input type="text" id="username" name="username" required placeholder="user@example.com">
    </div>

    <div class="form-group">
        <label for="password">Password (leave blank for dynamic generator):</label>
        <input type="password" id="password" name="password" placeholder="Enter password or leave empty for auto-generation">
    </div>

    <button type="submit">Encrypt & Commit to Vault</button>
</form>

<div style="text-align: center; margin-top: 25px;">
    <a href="{{ url_for('index') }}" class="nav a" style="font-size: 0.9rem; padding: 8px 18px;">Cancel</a>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}PyVault - Add Password{% endblock %}

{% block content %}
<h2>Add New Password</h2>

<form method="post">
    <div class="form-group">
        <label for="service">Service Name:</label>
        <input type="text" id="service" name="service" required placeholder="e.g., gmail, github, amazon">
    </div>

    <div class="form-group">
        <label for="username">Username/Email:</label>
        <input type="text" id="username" name="username" required placeholder="your.username@example.com">
    </div>

    <div class="form-group">
        <label for="password">Password (leave empty to generate):</label>
        <input type="password" id="password" name="password" placeholder="Enter password or leave blank for auto-generation">
    </div>

    <button type="submit">Add Password</button>
</form>
{% endblock %}

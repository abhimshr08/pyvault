{% extends "base.html" %}

{% block title %}PyVault - View Password{% endblock %}

{% block content %}
<h2>Password for {{ service }}</h2>

<div class="password-display">
    <p><strong>Service:</strong> {{ service }}</p>
    <p><strong>Username:</strong> {{ username }}</p>
    <p><strong>Password:</strong></p>
    <div class="generated-password">{{ password }}</div>
</div>

<a href="{{ url_for('index') }}" class="btn-secondary" style="display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px;">Back to Home</a>
{% endblock %}

{% extends "base.html" %}

{% block title %}PyVault - Login{% endblock %}

{% block content %}
<h2>Log In to PyVault</h2>

<form method="post">
    <div class="form-group">
        <label for="email">Email Address:</label>
        <input type="text" id="email" name="email" required placeholder="your.name@example.com">
    </div>

    <div class="form-group">
        <label for="password">Master Password:</label>
        <input type="password" id="password" name="password" required placeholder="Enter master password">
    </div>

    <button type="submit">Log In</button>
</form>

<p style="text-align: center; margin-top: 20px;">
    Don't have an account? <a href="{{ url_for('register') }}" style="color: #667eea; text-decoration: none;">Register here</a>.
</p>
{% endblock %}
